<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PFD Tático - ATECH Mission System</title>
    <link rel="stylesheet" type="text/css" href="css/flightindicators.css" />
    <link rel="stylesheet" type="text/css" href="css/style.css" />
</head>
<body>

    <canvas id="horizon-canvas"></canvas>

    <img src="img/dentro.png" id="cockpit-image" alt="Cockpit ATECH">

    <div class="dashboard-panel" id="main-panel">
        <span id="airspeed"></span>
        <span id="attitude"></span>
        <span id="altimeter"></span>
        <span id="turn_coordinator"></span>
        <span id="heading"></span>
        <span id="variometer"></span>
    </div>

    <div class="ai-panel">
        <div class="header-tag">Tactical Voice Command</div>
        <div id="status-container">
            <div id="status-label">Sistema de Comunicação Edge</div>
            <div id="status-text">RÁDIO DESLIGADO. AGUARDANDO.</div>
        </div>
        <button id="btn-mic">🎙️ Ligar Rádio (Microfone)</button>
        <button id="btn-usb" style="margin-top: 10px; background-color: #ff9900; color: black; font-weight: bold; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer;">🔌 Conectar Cabo USB</button>
        
        <button id="btn-log" style="margin-top: 10px; width: 100%; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; background-color: #333; color: #00d4ff; border: 1px solid #00d4ff;">💾 Baixar Telemetria (Caixa Preta)</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/jquery.flightindicators.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
